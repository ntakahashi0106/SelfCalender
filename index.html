<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>アナログ風卓上カレンダー & メモ</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kiwi+Maru:wght@400;500;700&family=Zen+Maru+Gothic:wght@500;700&display=swap" rel="stylesheet">
    <!-- FontAwesome icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body {
            font-family: 'Zen Maru Gothic', sans-serif;
            background-color: #f4efe6;
            background-image: radial-gradient(#e5dec9 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .handwritten {
            font-family: 'Kiwi Maru', serif;
        }

        .paper-board {
            background-color: #fdfbf7;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08), 0 1px 3px rgba(0,0,0,0.05);
            border: 1px solid #e8e2d5;
        }

        .binder-hole {
            width: 14px;
            height: 14px;
            background-color: #5d5547;
            border-radius: 50%;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.6);
        }

        /* 可視性と一覧性を最適化したコンパクト付箋 */
        .sticky-note {
            transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 1px 2px 4px rgba(0,0,0,0.06);
            border-radius: 6px;
            word-break: break-all;
            line-height: 1.2;
        }

        .sticky-note:hover {
            transform: translateY(-2px) scale(1.03);
            box-shadow: 2px 5px 12px rgba(0,0,0,0.15);
            z-index: 30;
        }

        /* 付箋カラーバリエーション */
        .note-yellow { background-color: #fef08a; border-left: 3.5px solid #ca8a04; color: #713f12; }
        .note-pink   { background-color: #fbcfe8; border-left: 3.5px solid #db2777; color: #831843; }
        .note-blue   { background-color: #bfdbfe; border-left: 3.5px solid #2563eb; color: #1e3a8a; }
        .note-green  { background-color: #bbf7d0; border-left: 3.5px solid #16a34a; color: #14532d; }
        .note-orange { background-color: #ffedd5; border-left: 3.5px solid #ea580c; color: #7c2d12; }

        .stamp-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            animation: stampPop 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes stampPop {
            0% { transform: scale(2) rotate(-10deg); opacity: 0; }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }

        /* ツールチップ（全文プレビュー） */
        .tooltip-text {
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.2s ease, visibility 0.2s ease;
        }

        .group\/note:hover .tooltip-text {
            visibility: visible;
            opacity: 1;
        }

        @media print {
            body { background: white; }
            .no-print { display: none !important; }
            .paper-board { box-shadow: none; border: none; width: 100% !important; }
            .calendar-cell { min-height: 120px !important; }
        }
    </style>
</head>
<body class="min-h-screen py-6 px-3 md:px-8 text-stone-800">

    <div class="max-w-7xl mx-auto">
        
        <!-- コントロールバー -->
        <header class="no-print flex flex-col lg:flex-row justify-between items-center mb-6 gap-4 bg-white/90 backdrop-blur-md p-4 rounded-2xl border border-stone-200 shadow-sm">
            <div class="flex items-center gap-3">
                <i class="fa-solid fa-calendar-days text-amber-700 text-2xl"></i>
                <h1 class="text-xl font-bold text-stone-800">アナログ風卓上カレンダー</h1>
            </div>
            
            <div class="flex flex-wrap items-center gap-2 sm:gap-3">
                <!-- カレンダー移動ボタン -->
                <div class="flex items-center bg-stone-100 rounded-lg p-1 border border-stone-200">
                    <button id="prevMonthBtn" class="px-3 py-1.5 hover:bg-white rounded-md transition text-stone-600 hover:text-stone-900 text-sm">
                        <i class="fa-solid fa-chevron-left"></i> 前月
                    </button>
                    <button id="todayBtn" class="px-3 py-1.5 hover:bg-white rounded-md transition font-medium text-stone-700 text-sm">
                        今月
                    </button>
                    <button id="nextMonthBtn" class="px-3 py-1.5 hover:bg-white rounded-md transition text-stone-600 hover:text-stone-900 text-sm">
                        次月 <i class="fa-solid fa-chevron-right"></i>
                    </button>
                </div>

                <!-- データ入出力ボタン -->
                <button id="dataManagerBtn" class="px-3 py-2 bg-amber-50 hover:bg-amber-100 text-amber-800 rounded-lg transition text-sm flex items-center gap-1.5 border border-amber-200 font-medium">
                    <i class="fa-solid fa-file-export"></i> データ出力/入出
                </button>

                <!-- クラウド設定ボタン -->
                <button id="cloudConfigBtn" class="px-3 py-2 bg-stone-100 hover:bg-stone-200 text-stone-700 rounded-lg transition text-sm flex items-center gap-1.5 border border-stone-300">
                    <i class="fa-solid fa-cloud text-sky-600"></i> クラウド設定
                </button>

                <!-- 印刷ボタン -->
                <button id="printBtn" class="px-4 py-2 bg-stone-700 hover:bg-stone-800 text-white rounded-lg transition flex items-center gap-2 shadow-sm text-sm">
                    <i class="fa-solid fa-print"></i> 印刷
                </button>
            </div>
        </header>

        <!-- メインカレンダー -->
        <main class="paper-board rounded-3xl p-4 md:p-8 relative">
            
            <div class="absolute -top-3 left-1/2 -translate-x-1/2 flex gap-8 md:gap-12 no-print">
                <div class="binder-hole"></div>
                <div class="binder-hole"></div>
                <div class="binder-hole"></div>
                <div class="binder-hole"></div>
                <div class="binder-hole"></div>
                <div class="binder-hole"></div>
            </div>

            <div class="flex flex-col md:flex-row justify-between items-baseline mb-6 border-b-2 border-stone-200 pb-4 mt-2">
                <div class="flex items-baseline gap-4">
                    <span id="yearDisplay" class="text-2xl md:text-3xl font-bold text-stone-500 handwritten">2026</span>
                    <span id="monthDisplay" class="text-5xl md:text-6xl font-black text-amber-900 handwritten">7月</span>
                </div>
                <div class="text-stone-500 text-xs md:text-sm mt-2 md:mt-0 flex items-center gap-2">
                    <span class="inline-block w-2.5 h-2.5 rounded-full bg-amber-500"></span>
                    <span>メモ冒頭4文字が表示されます（ホバー/タップで全文ポップアップ表示）</span>
                </div>
            </div>

            <!-- 曜日ヘッダー -->
            <div class="grid grid-cols-7 gap-1 md:gap-2 mb-2 text-center font-bold text-stone-600">
                <div class="py-2 text-rose-600 bg-rose-50/60 rounded-lg text-sm md:text-base">日</div>
                <div class="py-2 bg-stone-50/60 rounded-lg text-sm md:text-base">月</div>
                <div class="py-2 bg-stone-50/60 rounded-lg text-sm md:text-base">火</div>
                <div class="py-2 bg-stone-50/60 rounded-lg text-sm md:text-base">水</div>
                <div class="py-2 bg-stone-50/60 rounded-lg text-sm md:text-base">木</div>
                <div class="py-2 bg-stone-50/60 rounded-lg text-sm md:text-base">金</div>
                <div class="py-2 text-sky-600 bg-sky-50/60 rounded-lg text-sm md:text-base">土</div>
            </div>

            <!-- カレンダーグリッド -->
            <div id="calendarGrid" class="grid grid-cols-7 gap-1 md:gap-2">
                <!-- JavaScriptで動的生成 -->
            </div>
        </main>
    </div>

    <!-- メモ＆スタンプモーダル -->
    <div id="noteModal" class="fixed inset-0 bg-stone-900/40 backdrop-blur-sm flex items-center justify-center p-4 z-50 hidden">
        <div class="bg-white rounded-2xl max-w-md w-full p-6 shadow-2xl border border-stone-100 transform transition-all">
            <div class="flex justify-between items-center mb-4 border-b border-stone-100 pb-3">
                <h3 class="text-lg font-bold text-stone-800 flex items-center gap-2">
                    <i class="fa-solid fa-pen-to-square text-amber-600"></i>
                    <span id="modalDateTitle">2026/07/01</span> のメモ設定
                </h3>
                <button id="closeModalBtn" class="text-stone-400 hover:text-stone-600 p-1">
                    <i class="fa-solid fa-xmark text-xl"></i>
                </button>
            </div>

            <div class="flex border-b border-stone-200 mb-4">
                <button id="tabMemoBtn" class="flex-1 py-2 font-medium text-amber-700 border-b-2 border-amber-600 text-center">
                    <i class="fa-solid fa-sticky-note mr-1"></i> メモを書く
                </button>
                <button id="tabStampBtn" class="flex-1 py-2 font-medium text-stone-500 hover:text-stone-700 text-center">
                    <i class="fa-solid fa-icons mr-1"></i> スタンプを押す
                </button>
            </div>

            <!-- メモフォーム -->
            <div id="memoFormSection" class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-stone-500 mb-1.5">付箋の色</label>
                    <div class="flex gap-2" id="colorPicker">
                        <button type="button" data-color="yellow" class="w-8 h-8 rounded-full note-yellow border-2 border-amber-400 flex items-center justify-center text-xs text-amber-800 font-bold color-opt"><i class="fa-solid fa-check"></i></button>
                        <button type="button" data-color="pink" class="w-8 h-8 rounded-full note-pink border-2 border-transparent flex items-center justify-center text-xs text-pink-800 font-bold color-opt"></button>
                        <button type="button" data-color="blue" class="w-8 h-8 rounded-full note-blue border-2 border-transparent flex items-center justify-center text-xs text-blue-800 font-bold color-opt"></button>
                        <button type="button" data-color="green" class="w-8 h-8 rounded-full note-green border-2 border-transparent flex items-center justify-center text-xs text-green-800 font-bold color-opt"></button>
                        <button type="button" data-color="orange" class="w-8 h-8 rounded-full note-orange border-2 border-transparent flex items-center justify-center text-xs text-orange-800 font-bold color-opt"></button>
                    </div>
                </div>

                <div>
                    <label for="noteInput" class="block text-xs font-bold text-stone-500 mb-1.5">メモ内容</label>
                    <textarea id="noteInput" rows="4" class="w-full p-3 bg-stone-50 border border-stone-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-amber-500/50 handwritten text-base" placeholder="例: 14:00 打ち合わせ&#10;夕方 スーパー買い物"></textarea>
                </div>

                <div class="flex justify-end gap-2 pt-2">
                    <button id="cancelModalBtn" class="px-4 py-2 text-stone-600 hover:bg-stone-100 rounded-lg text-sm">キャンセル</button>
                    <button id="saveNoteBtn" class="px-5 py-2 bg-amber-600 hover:bg-amber-700 text-white font-medium rounded-lg text-sm shadow-sm transition">保存する</button>
                </div>
            </div>

            <!-- スタンプ選択 -->
            <div id="stampFormSection" class="hidden space-y-4">
                <p class="text-xs text-stone-500">日付の上に貼るスタンプを選んでください。</p>
                <div class="grid grid-cols-4 gap-3 py-2">
                    <button class="stamp-select-btn p-3 bg-stone-50 hover:bg-amber-50 border border-stone-200 rounded-xl text-center hover:border-amber-400 transition" data-stamp="⭐">
                        <span class="text-2xl">⭐</span>
                        <span class="block text-xs text-stone-600 mt-1">重要</span>
                    </button>
                    <button class="stamp-select-btn p-3 bg-stone-50 hover:bg-amber-50 border border-stone-200 rounded-xl text-center hover:border-amber-400 transition" data-stamp="⭕">
                        <span class="text-2xl">⭕</span>
                        <span class="block text-xs text-stone-600 mt-1">予定あり</span>
                    </button>
                    <button class="stamp-select-btn p-3 bg-stone-50 hover:bg-amber-50 border border-stone-200 rounded-xl text-center hover:border-amber-400 transition" data-stamp="🎂">
                        <span class="text-2xl">🎂</span>
                        <span class="block text-xs text-stone-600 mt-1">誕生日</span>
                    </button>
                    <button class="stamp-select-btn p-3 bg-stone-50 hover:bg-amber-50 border border-stone-200 rounded-xl text-center hover:border-amber-400 transition" data-stamp="💼">
                        <span class="text-2xl">💼</span>
                        <span class="block text-xs text-stone-600 mt-1">仕事</span>
                    </button>
                    <button class="stamp-select-btn p-3 bg-stone-50 hover:bg-amber-50 border border-stone-200 rounded-xl text-center hover:border-amber-400 transition" data-stamp="🏥">
                        <span class="text-2xl">🏥</span>
                        <span class="block text-xs text-stone-600 mt-1">病院</span>
                    </button>
                    <button class="stamp-select-btn p-3 bg-stone-50 hover:bg-amber-50 border border-stone-200 rounded-xl text-center hover:border-amber-400 transition" data-stamp="✈️">
                        <span class="text-2xl">✈️</span>
                        <span class="block text-xs text-stone-600 mt-1">旅行</span>
                    </button>
                    <button class="stamp-select-btn p-3 bg-stone-50 hover:bg-amber-50 border border-stone-200 rounded-xl text-center hover:border-amber-400 transition" data-stamp="🛍️">
                        <span class="text-2xl">🛍️</span>
                        <span class="block text-xs text-stone-600 mt-1">買い物</span>
                    </button>
                    <button class="stamp-select-btn p-3 bg-stone-50 hover:bg-amber-50 border border-stone-200 rounded-xl text-center hover:border-amber-400 transition" data-stamp="❤️">
                        <span class="text-2xl">❤️</span>
                        <span class="block text-xs text-stone-600 mt-1">イベント</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- データ管理モーダル -->
    <div id="dataModal" class="fixed inset-0 bg-stone-900/40 backdrop-blur-sm flex items-center justify-center p-4 z-50 hidden">
        <div class="bg-white rounded-2xl max-w-lg w-full p-6 shadow-2xl border border-stone-100">
            <div class="flex justify-between items-center mb-4 border-b border-stone-100 pb-3">
                <h3 class="text-lg font-bold text-stone-800 flex items-center gap-2">
                    <i class="fa-solid fa-database text-amber-600"></i> データ管理
                </h3>
                <button id="closeDataModalBtn" class="text-stone-400 hover:text-stone-600 p-1">
                    <i class="fa-solid fa-xmark text-xl"></i>
                </button>
            </div>

            <div class="space-y-6">
                <!-- エクスポート -->
                <div class="bg-stone-50 p-4 rounded-xl border border-stone-200">
                    <h4 class="font-bold text-sm text-stone-800 mb-1 flex items-center gap-2">
                        <i class="fa-solid fa-download text-amber-600"></i> データのエクスポート (ダウンロード)
                    </h4>
                    <p class="text-xs text-stone-600 mb-3">
                        全メモ・スタンプをJSONファイルとして保存します。
                    </p>
                    <button id="exportJsonBtn" class="w-full py-2.5 bg-amber-600 hover:bg-amber-700 text-white font-medium rounded-lg text-sm transition flex items-center justify-center gap-2">
                        <i class="fa-solid fa-file-arrow-down"></i> バックアップを保存
                    </button>
                </div>

                <!-- インポート -->
                <div class="bg-stone-50 p-4 rounded-xl border border-stone-200">
                    <h4 class="font-bold text-sm text-stone-800 mb-1 flex items-center gap-2">
                        <i class="fa-solid fa-upload text-sky-600"></i> データのインポート (復元)
                    </h4>
                    <p class="text-xs text-stone-600 mb-3">
                        過去のJSONファイルからデータを復元します。
                    </p>
                    <input type="file" id="importFileInput" accept=".json" class="hidden">
                    <button id="triggerImportBtn" class="w-full py-2.5 bg-sky-600 hover:bg-sky-700 text-white font-medium rounded-lg text-sm transition flex items-center justify-center gap-2">
                        <i class="fa-solid fa-file-arrow-up"></i> ファイルを選択して復元
                    </button>
                </div>

                <!-- テキスト直接指定 -->
                <div>
                    <label class="block text-xs font-bold text-stone-600 mb-1">JSONテキストプレビュー/直接入力</label>
                    <textarea id="jsonPreviewArea" rows="3" class="w-full p-2.5 font-mono text-xs bg-stone-50 border border-stone-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-500/50"></textarea>
                    <div class="flex justify-end gap-2 mt-2">
                        <button id="copyJsonBtn" class="px-3 py-1.5 bg-stone-200 hover:bg-stone-300 text-stone-700 rounded text-xs transition">
                            <i class="fa-solid fa-copy mr-1"></i> コピー
                        </button>
                        <button id="applyTextJsonBtn" class="px-3 py-1.5 bg-amber-600 hover:bg-amber-700 text-white rounded text-xs transition">
                            テキストから復元
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- クラウド設定モーダル -->
    <div id="cloudModal" class="fixed inset-0 bg-stone-900/40 backdrop-blur-sm flex items-center justify-center p-4 z-50 hidden">
        <div class="bg-white rounded-2xl max-w-lg w-full p-6 shadow-2xl border border-stone-100">
            <div class="flex justify-between items-center mb-4 border-b border-stone-100 pb-3">
                <h3 class="text-lg font-bold text-stone-800 flex items-center gap-2">
                    <i class="fa-solid fa-cloud text-sky-600"></i> クラウド保存 (Firebase)
                </h3>
                <button id="closeCloudModalBtn" class="text-stone-400 hover:text-stone-600 p-1">
                    <i class="fa-solid fa-xmark text-xl"></i>
                </button>
            </div>
            
            <p class="text-xs text-stone-600 leading-relaxed mb-4">
                Firebase Firestoreの認証情報を追加すると、スマホとPC間で同一データを自動同期します。
            </p>

            <div class="space-y-3 mb-4">
                <div>
                    <label class="block text-xs font-bold text-stone-600 mb-1">Firebase Config (JSON)</label>
                    <textarea id="firebaseConfigInput" rows="4" class="w-full p-2.5 font-mono text-xs bg-stone-50 border border-stone-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-sky-500/50" placeholder='{"apiKey": "...", "projectId": "..."}'></textarea>
                </div>
            </div>

            <div class="flex justify-end gap-2">
                <button id="cancelCloudModalBtn" class="px-4 py-2 text-stone-600 hover:bg-stone-100 rounded-lg text-sm">キャンセル</button>
                <button id="saveCloudBtn" class="px-5 py-2 bg-sky-600 hover:bg-sky-700 text-white font-medium rounded-lg text-sm shadow-sm transition">クラウド有効化</button>
            </div>
        </div>
    </div>

    <!-- JavaScript ロジック -->
    <script>
        class AnalogCalendarApp {
            constructor() {
                this.currentDate = new Date();
                this.selectedDateStr = null;
                this.editingNoteId = null;
                this.selectedColor = 'yellow';

                this.eventsData = this.loadLocalData();

                this.calendarGrid = document.getElementById('calendarGrid');
                this.yearDisplay = document.getElementById('yearDisplay');
                this.monthDisplay = document.getElementById('monthDisplay');
                this.noteModal = document.getElementById('noteModal');
                this.dataModal = document.getElementById('dataModal');
                this.modalDateTitle = document.getElementById('modalDateTitle');
                this.noteInput = document.getElementById('noteInput');

                this.initEventListeners();
                this.render();
            }

            loadLocalData() {
                const saved = localStorage.getItem('analog_calendar_data');
                return saved ? JSON.parse(saved) : {};
            }

            saveData() {
                localStorage.setItem('analog_calendar_data', JSON.stringify(this.eventsData));
            }

            initEventListeners() {
                document.getElementById('prevMonthBtn').addEventListener('click', () => {
                    this.currentDate.setMonth(this.currentDate.getMonth() - 1);
                    this.render();
                });

                document.getElementById('nextMonthBtn').addEventListener('click', () => {
                    this.currentDate.setMonth(this.currentDate.getMonth() + 1);
                    this.render();
                });

                document.getElementById('todayBtn').addEventListener('click', () => {
                    this.currentDate = new Date();
                    this.render();
                });

                document.getElementById('printBtn').addEventListener('click', () => {
                    window.print();
                });

                // データ管理モーダル
                document.getElementById('dataManagerBtn').addEventListener('click', () => {
                    this.openDataModal();
                });
                document.getElementById('closeDataModalBtn').addEventListener('click', () => {
                    this.dataModal.classList.add('hidden');
                });

                document.getElementById('exportJsonBtn').addEventListener('click', () => {
                    this.exportJsonFile();
                });

                const fileInput = document.getElementById('importFileInput');
                document.getElementById('triggerImportBtn').addEventListener('click', () => {
                    fileInput.click();
                });
                fileInput.addEventListener('change', (e) => {
                    this.importJsonFile(e);
                });

                document.getElementById('copyJsonBtn').addEventListener('click', () => {
                    const area = document.getElementById('jsonPreviewArea');
                    area.select();
                    document.execCommand('copy');
                    alert('JSONデータをクリップボードにコピーしました。');
                });

                document.getElementById('applyTextJsonBtn').addEventListener('click', () => {
                    const area = document.getElementById('jsonPreviewArea');
                    try {
                        const data = JSON.parse(area.value);
                        this.eventsData = data;
                        this.saveData();
                        this.render();
                        this.dataModal.classList.add('hidden');
                        alert('データを正常に復元しました。');
                    } catch (err) {
                        alert('不正なJSONフォーマットです。');
                    }
                });

                // クラウド設定モーダル
                const cloudModal = document.getElementById('cloudModal');
                document.getElementById('cloudConfigBtn').addEventListener('click', () => {
                    cloudModal.classList.remove('hidden');
                });
                document.getElementById('closeCloudModalBtn').addEventListener('click', () => {
                    cloudModal.classList.add('hidden');
                });
                document.getElementById('cancelCloudModalBtn').addEventListener('click', () => {
                    cloudModal.classList.add('hidden');
                });

                // モーダル操作
                document.getElementById('closeModalBtn').addEventListener('click', () => this.closeModal());
                document.getElementById('cancelModalBtn').addEventListener('click', () => this.closeModal());
                document.getElementById('saveNoteBtn').addEventListener('click', () => this.saveNote());

                // タブ切り替え
                const tabMemoBtn = document.getElementById('tabMemoBtn');
                const tabStampBtn = document.getElementById('tabStampBtn');
                const memoSection = document.getElementById('memoFormSection');
                const stampSection = document.getElementById('stampFormSection');

                tabMemoBtn.addEventListener('click', () => {
                    tabMemoBtn.className = "flex-1 py-2 font-medium text-amber-700 border-b-2 border-amber-600 text-center";
                    tabStampBtn.className = "flex-1 py-2 font-medium text-stone-500 hover:text-stone-700 text-center";
                    memoSection.classList.remove('hidden');
                    stampSection.classList.add('hidden');
                });

                tabStampBtn.addEventListener('click', () => {
                    tabStampBtn.className = "flex-1 py-2 font-medium text-amber-700 border-b-2 border-amber-600 text-center";
                    tabMemoBtn.className = "flex-1 py-2 font-medium text-stone-500 hover:text-stone-700 text-center";
                    stampSection.classList.remove('hidden');
                    memoSection.classList.add('hidden');
                });

                // カラーピッカー
                document.querySelectorAll('.color-opt').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        document.querySelectorAll('.color-opt').forEach(b => {
                            b.className = b.className.replace(/border-(amber|pink|blue|green|orange)-400/, 'border-transparent');
                            b.innerHTML = '';
                        });
                        const target = e.currentTarget;
                        this.selectedColor = target.dataset.color;
                        const borderColorClass = `border-${this.selectedColor === 'yellow' ? 'amber' : this.selectedColor}-400`;
                        target.classList.replace('border-transparent', borderColorClass);
                        target.innerHTML = '<i class="fa-solid fa-check"></i>';
                    });
                });

                // スタンプ選択ボタン
                document.querySelectorAll('.stamp-select-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const stamp = e.currentTarget.dataset.stamp;
                        this.addStamp(stamp);
                    });
                });
            }

            openDataModal() {
                const jsonStr = JSON.stringify(this.eventsData, null, 2);
                document.getElementById('jsonPreviewArea').value = jsonStr;
                this.dataModal.classList.remove('hidden');
            }

            exportJsonFile() {
                const jsonStr = JSON.stringify(this.eventsData, null, 2);
                const blob = new Blob([jsonStr], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `calendar-backup-${new Date().toISOString().slice(0, 10)}.json`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            }

            importJsonFile(event) {
                const file = event.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const importedData = JSON.parse(e.target.result);
                        this.eventsData = importedData;
                        this.saveData();
                        this.render();
                        this.dataModal.classList.add('hidden');
                        alert('データを正常に復元しました。');
                    } catch (err) {
                        alert('ファイルの読み込みに失敗しました。');
                    }
                };
                reader.readAsText(file);
            }

            render() {
                const year = this.currentDate.getFullYear();
                const month = this.currentDate.getMonth();

                this.yearDisplay.textContent = year;
                this.monthDisplay.textContent = `${month + 1}月`;

                this.calendarGrid.innerHTML = '';

                const firstDay = new Date(year, month, 1);
                const lastDay = new Date(year, month + 1, 0);
                const startingDayOfWeek = firstDay.getDay();
                const totalDays = lastDay.getDate();

                const prevMonthLastDay = new Date(year, month, 0).getDate();
                for (let i = startingDayOfWeek - 1; i >= 0; i--) {
                    const cell = this.createCellElement(prevMonthLastDay - i, true);
                    this.calendarGrid.appendChild(cell);
                }

                const today = new Date();
                for (let day = 1; day <= totalDays; day++) {
                    const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                    const isToday = today.getFullYear() === year && today.getMonth() === month && today.getDate() === day;
                    const dayOfWeek = new Date(year, month, day).getDay();

                    const cell = this.createCellElement(day, false, dateStr, isToday, dayOfWeek);
                    this.calendarGrid.appendChild(cell);
                }

                const totalRendered = startingDayOfWeek + totalDays;
                const nextDays = (totalRendered > 35 ? 42 : 35) - totalRendered;
                for (let i = 1; i <= nextDays; i++) {
                    const cell = this.createCellElement(i, true);
                    this.calendarGrid.appendChild(cell);
                }
            }

            // メモ冒頭文字列のフォーマット処理（先頭4文字 + ...）
            formatShortText(text) {
                const cleanText = text.replace(/\s+/g, ' ').trim();
                if (cleanText.length <= 4) {
                    return cleanText;
                }
                return cleanText.substring(0, 4) + '…';
            }

            createCellElement(dayNum, isOtherMonth, dateStr = null, isToday = false, dayOfWeek = 0) {
                const cell = document.createElement('div');
                cell.className = `calendar-cell min-h-[110px] md:min-h-[135px] p-1.5 md:p-2 rounded-xl border border-stone-200/70 flex flex-col justify-between transition-all relative group ${
                    isOtherMonth ? 'bg-stone-100/40 text-stone-300' : 'bg-white/90 hover:bg-amber-50/20'
                } ${isToday ? 'ring-2 ring-amber-500 bg-amber-50/30' : ''}`;

                if (isOtherMonth) {
                    cell.innerHTML = `<span class="text-xs font-bold text-stone-300 p-1">${dayNum}</span>`;
                    return cell;
                }

                let textColorClass = 'text-stone-700';
                if (dayOfWeek === 0) textColorClass = 'text-rose-600';
                if (dayOfWeek === 6) textColorClass = 'text-sky-600';

                const topRow = document.createElement('div');
                topRow.className = 'flex justify-between items-start mb-1';

                const dayBadge = document.createElement('span');
                dayBadge.className = `text-sm md:text-base font-bold ${textColorClass} ${
                    isToday ? 'bg-amber-500 text-white rounded-full w-6 h-6 md:w-7 md:h-7 flex items-center justify-center -mt-1 -ml-1 shadow-sm' : 'p-0.5'
                }`;
                dayBadge.textContent = dayNum;
                topRow.appendChild(dayBadge);

                // スタンプ表示領域
                const stampsContainer = document.createElement('div');
                stampsContainer.className = 'flex flex-wrap gap-0.5 justify-end max-w-[65%]';
                
                const dayData = this.eventsData[dateStr] || { notes: [], stamps: [] };
                
                if (dayData.stamps && dayData.stamps.length > 0) {
                    dayData.stamps.forEach((stamp, index) => {
                        const stampEl = document.createElement('span');
                        stampEl.className = 'stamp-badge text-sm md:text-base cursor-pointer hover:scale-125 transition-transform';
                        stampEl.textContent = stamp;
                        stampEl.title = 'クリックでスタンプ削除';
                        stampEl.addEventListener('click', (e) => {
                            e.stopPropagation();
                            this.removeStamp(dateStr, index);
                        });
                        stampsContainer.appendChild(stampEl);
                    });
                }
                topRow.appendChild(stampsContainer);
                cell.appendChild(topRow);

                // メモ表示領域（冒頭4文字バッジ）
                const notesContainer = document.createElement('div');
                notesContainer.className = 'space-y-1 overflow-y-auto flex-1 max-h-[75px] md:max-h-[95px] pr-0.5';

                if (dayData.notes && dayData.notes.length > 0) {
                    dayData.notes.forEach((note) => {
                        const noteEl = document.createElement('div');
                        noteEl.className = `sticky-note note-${note.color || 'yellow'} px-1.5 py-1 rounded text-xs handwritten relative group/note flex justify-between items-center cursor-pointer`;
                        
                        // 冒頭4文字テキスト
                        const textSpan = document.createElement('span');
                        textSpan.className = 'font-bold tracking-tight text-[11px] md:text-xs';
                        textSpan.textContent = this.formatShortText(note.text);

                        // 削除アイコン
                        const delBtn = document.createElement('button');
                        delBtn.className = 'opacity-0 group-hover/note:opacity-100 text-stone-400 hover:text-stone-800 ml-1 p-0.5 transition shrink-0';
                        delBtn.innerHTML = '<i class="fa-solid fa-xmark text-[10px]"></i>';
                        delBtn.addEventListener('click', (e) => {
                            e.stopPropagation();
                            this.deleteNote(dateStr, note.id);
                        });

                        // ツールチップ（全文プレビュー）
                        const tooltip = document.createElement('div');
                        tooltip.className = 'tooltip-text absolute left-0 bottom-full mb-1.5 w-44 md:w-52 p-2.5 bg-stone-900/95 text-white text-xs rounded-lg shadow-xl z-50 pointer-events-none whitespace-pre-wrap handwritten font-normal leading-relaxed';
                        tooltip.textContent = note.text;

                        noteEl.appendChild(textSpan);
                        noteEl.appendChild(delBtn);
                        noteEl.appendChild(tooltip);

                        // タップ/クリックでモーダル編集
                        noteEl.addEventListener('click', (e) => {
                            e.stopPropagation();
                            this.openModal(dateStr, note);
                        });

                        notesContainer.appendChild(noteEl);
                    });
                }

                cell.appendChild(notesContainer);

                const addHint = document.createElement('div');
                addHint.className = 'no-print opacity-0 group-hover:opacity-100 text-stone-400 text-right text-[10px] pt-0.5 transition-opacity';
                addHint.innerHTML = '<i class="fa-solid fa-plus"></i> 追加';
                cell.appendChild(addHint);

                cell.addEventListener('click', () => {
                    this.openModal(dateStr);
                });

                return cell;
            }

            openModal(dateStr, noteToEdit = null) {
                this.selectedDateStr = dateStr;
                this.modalDateTitle.textContent = dateStr.replace('-', '年').replace('-', '月') + '日';

                if (noteToEdit) {
                    this.editingNoteId = noteToEdit.id;
                    this.noteInput.value = noteToEdit.text;
                    this.selectedColor = noteToEdit.color || 'yellow';
                } else {
                    this.editingNoteId = null;
                    this.noteInput.value = '';
                    this.selectedColor = 'yellow';
                }

                document.querySelectorAll('.color-opt').forEach(b => {
                    b.className = b.className.replace(/border-(amber|pink|blue|green|orange)-400/, 'border-transparent');
                    b.innerHTML = '';
                    if (b.dataset.color === this.selectedColor) {
                        const borderColorClass = `border-${this.selectedColor === 'yellow' ? 'amber' : this.selectedColor}-400`;
                        b.classList.replace('border-transparent', borderColorClass);
                        b.innerHTML = '<i class="fa-solid fa-check"></i>';
                    }
                });

                this.noteModal.classList.remove('hidden');
                setTimeout(() => this.noteInput.focus(), 100);
            }

            closeModal() {
                this.noteModal.classList.add('hidden');
                this.selectedDateStr = null;
                this.editingNoteId = null;
            }

            saveNote() {
                const text = this.noteInput.value.trim();
                if (!text || !this.selectedDateStr) return;

                if (!this.eventsData[this.selectedDateStr]) {
                    this.eventsData[this.selectedDateStr] = { notes: [], stamps: [] };
                }

                const dayNotes = this.eventsData[this.selectedDateStr].notes;

                if (this.editingNoteId) {
                    const note = dayNotes.find(n => n.id === this.editingNoteId);
                    if (note) {
                        note.text = text;
                        note.color = this.selectedColor;
                    }
                } else {
                    dayNotes.push({
                        id: Date.now().toString(),
                        text: text,
                        color: this.selectedColor
                    });
                }

                this.saveData();
                this.closeModal();
                this.render();
            }

            deleteNote(dateStr, noteId) {
                if (this.eventsData[dateStr] && this.eventsData[dateStr].notes) {
                    this.eventsData[dateStr].notes = this.eventsData[dateStr].notes.filter(n => n.id !== noteId);
                    this.saveData();
                    this.render();
                }
            }

            addStamp(stampSymbol) {
                if (!this.selectedDateStr) return;

                if (!this.eventsData[this.selectedDateStr]) {
                    this.eventsData[this.selectedDateStr] = { notes: [], stamps: [] };
                }

                if (!this.eventsData[this.selectedDateStr].stamps) {
                    this.eventsData[this.selectedDateStr].stamps = [];
                }

                if (this.eventsData[this.selectedDateStr].stamps.length >= 4) {
                    alert('スタンプは1日最大4つまで貼り付け可能です。');
                    return;
                }

                this.eventsData[this.selectedDateStr].stamps.push(stampSymbol);
                this.saveData();
                this.closeModal();
                this.render();
            }

            removeStamp(dateStr, stampIndex) {
                if (this.eventsData[dateStr] && this.eventsData[dateStr].stamps) {
                    this.eventsData[dateStr].stamps.splice(stampIndex, 1);
                    this.saveData();
                    this.render();
                }
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            window.app = new AnalogCalendarApp();
        });
    </script>
</body>
</html>
